<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; color: #000000; font-family: sans-serif; }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 1rem 2rem 0;
    }

    header { text-align: right; }
    header h1 { font-size: 2.5rem; letter-spacing: 0.1em; }
    header p  { color: #aaa; margin-top: 0.5rem; }

    .tabs {
      display: flex;
      justify-content: flex-start;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .tab-button {
      padding: 0.8rem 1.2rem;
      border: none;
      background: none;
      color: #aaa;
      text-transform: lowercase;
      letter-spacing: 0.08em;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .tab-button.active,
    .tab-button:hover {
      color: #222;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      padding: 2rem 1rem 3rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .grid img {
      width: 100%;
      height: auto;
      object-fit: cover;
      background: #ffffff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .grid img:hover {
      opacity: 0.95;
      transform: translateY(-2px);
    }

    .photo-card {
      overflow: hidden;
    }

    /* Lightbox */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      justify-content: center; align-items: center;
      z-index: 100;
      padding: 2rem;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; }
    #lightbox-close {
      position: absolute; top: 1rem; right: 1.5rem;
      font-size: 2rem; cursor: pointer; color: white;
    }

    @media (max-width: 800px) {
      .topbar { padding: 1rem 1rem 0; }
      header h1 { font-size: 2rem; }
      .grid { padding: 1.5rem 0.75rem 2rem; }
    }

    @media (max-width: 500px) {
      .tab-button { flex: 1 1 45%; text-align: center; }
      .photo-card p { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="tabs" id="tabs">
      <button class="tab-button active" data-category="geo">geo</button>
      <button class="tab-button" data-category="destinations">destinations</button>
      <button class="tab-button" data-category="frames">frames</button>
      <button class="tab-button" data-category="twos">twos</button>
    </div>
    <header>
      <h1>miffynco</h1>
      <p>photogallery</p>
    </header>
  </div>

  <div class="grid" id="gallery">
    <!-- Gallery images will be generated by script -->
  </div>

  <div id="lightbox">
    <span id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // Edit the position numbers here to rearrange photos inside each category
    const photoOrder = [
      { file: "geo_4.jpg", position: 1, category: "geo" },
      { file: "geo_1.jpg", position: 2, category: "geo" },
      { file: "geo_3.jpg", position: 3, category: "geo" },
      { file: "geo_5.jpg", position: 4, category: "geo" },
      { file: "geo_2.jpg", position: 5, category: "geo" },
      { file: "dest_1.jpg", position: 1, category: "destinations" },
      { file: "dest_2.jpg", position: 2, category: "destinations" },
      { file: "dest_3.jpg", position: 3, category: "destinations" },
      { file: "dest_4.jpg", position: 4, category: "destinations" },
      { file: "dest_5.jpg", position: 5, category: "destinations" },
      { file: "frames_1.jpg", position: 1, category: "frames" },
      { file: "frames_2.jpg", position: 2, category: "frames" },
      { file: "frames_3.jpg", position: 3, category: "frames" },
      { file: "twos_1.jpg", position: 1, category: "twos" },
      { file: "twos_2.jpg", position: 2, category: "twos" },
      { file: "twos_3.jpg", position: 3, category: "twos" },
      { file: "twos_4.jpg", position: 4, category: "twos" },
    ];

    const gallery = document.getElementById('gallery');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const tabs = document.querySelectorAll('.tab-button');
    let activeCategory = 'geo';

    function renderGallery() {
      gallery.innerHTML = '';
      photoOrder
        .filter(photo => photo.category === activeCategory)
        .sort((a, b) => a.position - b.position)
        .forEach(photo => {
          const card = document.createElement('div');
          card.className = 'photo-card';

          const img = document.createElement('img');
          img.src = `photos/${photo.file}`;
          img.alt = photo.file;

          img.addEventListener('click', () => {
            lbImg.src = img.src;
            lb.classList.add('open');
          });

          card.appendChild(img);
          gallery.appendChild(card);
        });
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const category = tab.dataset.category;
        if (!category || category === activeCategory) return;
        activeCategory = category;
        tabs.forEach(button => button.classList.toggle('active', button === tab));
        renderGallery();
      });
    });

    renderGallery();

    document.getElementById('lightbox-close').addEventListener('click', () => {
      lb.classList.remove('open');
    });

    lb.addEventListener('click', e => {
      if (e.target === lb) lb.classList.remove('open');
    });
  </script>

</body>
</html>
