<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; color: #000000; font-family: sans-serif; }

    header { text-align: center; padding: 3rem 1rem; }
    header h1 { font-size: 2.5rem; letter-spacing: 0.1em; }
    header p  { color: #aaa; margin-top: 0.5rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 70px;
      padding: 3rem;
    }

    .grid img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: contain;
      background: #ffffff;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .grid img:hover { opacity: 0.8; }

    /* Lightbox */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center; align-items: center;
      z-index: 100;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
    #lightbox-close {
      position: absolute; top: 1rem; right: 1.5rem;
      font-size: 2rem; cursor: pointer; color: white;
    }

    @media (max-width: 600px) {
      header { padding: 1rem 1rem 0.75rem; }
      header h1 { font-size: 1.6rem; }
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>miffynco</h1>
    <p>photogallery</p>
  </header>

  <div class="grid" id="gallery">
    <!-- Gallery images will be generated by script -->
  </div>

  <div id="lightbox">
    <span id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // Edit the position numbers here to rearrange photos
    const photoOrder = [
      { file: "001.jpg", position: 1 },
      { file: "008.jpg", position: 2 },
      { file: "003.jpg", position: 3 },
      { file: "004.jpg", position: 4 },
      { file: "005.jpg", position: 5 },
      { file: "006.jpg", position: 6 },
      { file: "007.jpg", position: 7 },
      { file: "002.jpg", position: 8 },
      { file: "009.jpg", position: 9 },
      { file: "010.jpg", position: 10 },
      { file: "012.jpg", position: 11 },
    ];

    // Sort by position and generate gallery
    const gallery = document.getElementById('gallery');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');

    photoOrder
      .sort((a, b) => a.position - b.position)
      .forEach(photo => {
        const img = document.createElement('img');
        img.src = `photos/${photo.file}`;
        img.alt = photo.file;

        // Lightbox click
        img.addEventListener('click', () => {
          lbImg.src = img.src;
          lb.classList.add('open');
        });

        gallery.appendChild(img);
      });

    // Lightbox close
    document.getElementById('lightbox-close').addEventListener('click', () => {
      lb.classList.remove('open');
    });

    lb.addEventListener('click', e => {
      if (e.target === lb) lb.classList.remove('open');
    });
  </script>

</body>
</html>
