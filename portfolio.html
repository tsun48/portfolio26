<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; color: #000000; font-family: sans-serif; overflow-y: scroll; }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 1rem 2rem 0;
    }

    header { text-align: right; }
    header h1 { font-size: 2.5rem; letter-spacing: 0.1em; }
    header p  { color: #aaa; margin-top: 0.5rem; }

    .tabs {
      display: flex;
      justify-content: flex-start;
      column-gap: 0.75rem;
      row-gap: 0.25rem;
      flex-wrap: wrap;
    }

    .tab-button {
      padding: 0.8rem 1.2rem;
      border: none;
      background: none;
      color: #aaa;
      text-transform: lowercase;
      letter-spacing: 0.08em;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .tab-button.active,
    .tab-button:hover {
      color: #222;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      padding: 2rem 1rem 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .grid img {
      width: 100%;
      height: auto;
      object-fit: cover;
      background: #ffffff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      display: block;
    }

    .grid img:hover {
      opacity: 0.95;
      transform: translateY(-2px);
    }

    .photo-card {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      overflow: hidden;
    }

    .photo-card img {
      flex: 1;
      min-width: 0;
    }

    .photo-caption {
      width: 140px;
      flex-shrink: 0;
      color: #aaa;
      font-size: 0.85rem;
      line-height: 1.5;
      padding-top: 0.25rem;
      white-space: pre-line;
    }

    .about-section {
      display: none;
      max-width: 900px;
      margin: 3rem auto;
      padding: 0 1rem;
      color: #aaa;
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .about-section.open { display: block; }

    header h1 {
      cursor: pointer;
    }

    header h1:hover { opacity: 0.7; }

    header a {
      color: inherit;
      text-decoration: none;
    }

    header a:hover { opacity: 0.7; }

    /* Lightbox */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      justify-content: center; align-items: center;
      z-index: 100;
      padding: 2rem;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; }
    #lightbox-close {
      position: absolute; top: 1rem; right: 1.5rem;
      font-size: 2rem; cursor: pointer; color: white;
    }

    @media (max-width: 800px) {
      .topbar { padding: 1rem 1rem 0; }
      header h1 { font-size: 2rem; }
      .grid { padding: 1.5rem 0.75rem 2rem; }
    }

    @media (max-width: 500px) {
      .tab-button { flex: 1 1 45%; text-align: center; }
      .photo-card p { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="tabs" id="tabs">
      <button class="tab-button active" data-category="geometry">geometry</button>
      <button class="tab-button" data-category="destinations">destinations</button>
      <button class="tab-button" data-category="frames">frames</button>
      <button class="tab-button" data-category="twos">twos</button>
      <div style="flex-basis: 100%; height: 0;"></div>
      <button class="tab-button" data-category="salience">salience</button>
      <button class="tab-button" data-category="complemence">complemence</button>
      <button class="tab-button" data-category="radii">radii</button>
    </div>
    <header>
      <h1 id="about-toggle">miffynco</h1>
      <p><a href="https://github.com/tsun48/portfolio26" target="_blank">photogallery</a></p>
    </header>
  </div>

  <div class="about-section" id="about-section">
    <p>my name is tiffany. photography is fun. shot on panasonic lumix zs99 and other. always looking for more.</p>
  </div>

  <div class="grid" id="gallery">
    <!-- Gallery images will be generated by script -->
  </div>

  <div id="lightbox">
    <span id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // Edit the position numbers here to rearrange photos inside each category
    const photoOrder = [
      { file: "geo_6.jpg", position: 1, category: "geometry", caption: "2025.08.16\nO'HARE\nvanishing point" },
      { file: "geo_4.jpg", position: 2, category: "geometry" },
      { file: "geo_1.jpg", position: 3, category: "geometry" },
      { file: "geo_3.jpg", position: 4, category: "geometry" },
      { file: "geo_5.jpg", position: 5, category: "geometry" },
      { file: "geo_2.jpg", position: 6, category: "geometry" },

      { file: "dest_2.jpg", position: 1, category: "destinations" },
      { file: "dest_3.jpg", position: 2, category: "destinations" },
      { file: "dest_4.jpg", position: 3, category: "destinations" },
      { file: "dest_5.jpg", position: 4, category: "destinations" },

      { file: "frames_1.jpg", position: 1, category: "frames" },
      { file: "frames_2.jpg", position: 2, category: "frames" },
      { file: "frames_4.jpg", position: 3, category: "frames" },
      { file: "frames_5.jpg", position: 4, category: "frames" },

      { file: "sal_1.jpg", position: 1, category: "salience" },
      { file: "sal_2.jpg", position: 2, category: "salience" },
      { file: "sal_3.jpg", position: 3, category: "salience" },
      { file: "sal_4.jpg", position: 4, category: "salience" },
      { file: "sal_5.jpg", position: 5, category: "salience" },

      { file: "comp_1.jpg", position: 1, category: "complemence" },
      { file: "comp_2.jpg", position: 2, category: "complemence" },
      { file: "comp_3.jpg", position: 3, category: "complemence" },
      { file: "comp_4.jpg", position: 4, category: "complemence" },

      { file: "radii_1.jpg", position: 1, category: "radii" },
      { file: "radii_2.jpg", position: 2, category: "radii" },
      { file: "radii_3.jpg", position: 3, category: "radii" },
      { file: "radii_4.jpg", position: 4, category: "radii" },

      { file: "twos_4.jpg", position: 1, category: "twos" },
      { file: "twos_1.jpg", position: 2, category: "twos" },
      { file: "twos_2.jpg", position: 3, category: "twos" },
      { file: "twos_3.jpg", position: 4, category: "twos" },

    ];

    const gallery = document.getElementById('gallery');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const tabs = document.querySelectorAll('.tab-button');
    let activeCategory = 'geometry';

    function renderGallery() {
      gallery.innerHTML = '';
      photoOrder
        .filter(photo => photo.category === activeCategory)
        .sort((a, b) => a.position - b.position)
        .forEach(photo => {
          const card = document.createElement('div');
          card.className = 'photo-card';

          const img = document.createElement('img');
          img.src = `photos/${photo.file}`;
          img.alt = photo.file;

          img.addEventListener('click', () => {
            lbImg.src = img.src;
            lb.classList.add('open');
          });

          const caption = document.createElement('div');
          caption.className = 'photo-caption';
          caption.textContent = photo.caption || 'caption';

          card.appendChild(img);
          card.appendChild(caption);
          gallery.appendChild(card);
        });
    }

    const aboutSection = document.getElementById('about-section');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const category = tab.dataset.category;
        aboutSection.classList.remove('open');
        gallery.style.display = '';
        if (!category || category === activeCategory) return;
        activeCategory = category;
        tabs.forEach(button => button.classList.toggle('active', button === tab));
        renderGallery();
      });
    });

    document.getElementById('about-toggle').addEventListener('click', () => {
      const isOpen = aboutSection.classList.toggle('open');
      gallery.style.display = isOpen ? 'none' : '';
    });

    renderGallery();

    document.getElementById('lightbox-close').addEventListener('click', () => {
      lb.classList.remove('open');
    });

    lb.addEventListener('click', e => {
      if (e.target === lb) lb.classList.remove('open');
    });
  </script>

</body>
</html>
