<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; color: #000000; font-family: sans-serif; }

    header { text-align: center; padding: 3rem 1rem; }
    header h1 { font-size: 2.5rem; letter-spacing: 0.1em; }
    header p  { color: #aaa; margin-top: 0.5rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 50px;
      padding: 2rem;
    }

    .grid img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: contain;
      background: #ffffff;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .grid img:hover { opacity: 0.8; }

    /* Lightbox */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center; align-items: center;
      z-index: 100;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
    #lightbox-close {
      position: absolute; top: 1rem; right: 1.5rem;
      font-size: 2rem; cursor: pointer; color: white;
    }
  </style>
</head>
<body>

  <header>
    <h1>miffynco</h1>
    <p>photogallery</p>
  </header>

  <div class="grid" id="gallery">
    <img src="photos/001.jpg" alt="001">
    <img src="photos/002.jpg" alt="002">
    <img src="photos/003.jpg" alt="003">
    <img src="photos/004.jpg" alt="004">
    <img src="photos/005.jpg" alt="005">
    <img src="photos/006.jpg" alt="006">
    <img src="photos/007.jpg" alt="007">
    <img src="photos/008.jpg" alt="008">
    <img src="photos/009.jpg" alt="009">
    <img src="photos/010.jpg" alt="010">
    <img src="photos/012.jpg" alt="012">
  </div>

  <div id="lightbox">
    <span id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');

    document.querySelectorAll('.grid img').forEach(img => {
      img.addEventListener('click', () => {
        lbImg.src = img.src;
        lb.classList.add('open');
      });
    });

    document.getElementById('lightbox-close').addEventListener('click', () => {
      lb.classList.remove('open');
    });

    lb.addEventListener('click', e => {
      if (e.target === lb) lb.classList.remove('open');
    });
  </script>

</body>
</html>
